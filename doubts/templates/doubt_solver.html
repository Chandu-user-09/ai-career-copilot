<!DOCTYPE html>

<html>

<head>


<title>Doubt Solver</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">


</head>

<body>

<div class="container mt-5">

  
<h1>
    AI Doubt Solver
</h1>

<form method="POST">

    {% csrf_token %}

    <textarea
        name="question"
        class="form-control mt-3"
        rows="4"
        placeholder="Ask your doubt here..."></textarea>

    <button
        class="btn btn-primary mt-3">

        Ask

    </button>

</form>

{% if answer %}

    <div class="card mt-4">

        <div class="card-body">

            <h4>Answer</h4>

            <p>{{ answer }}</p>

        </div>

    </div>

{% endif %}


</div>

</body>

</html>
