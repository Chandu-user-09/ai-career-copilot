<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        AI Career Copilot
        {% endblock %}
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        html{
            scroll-behavior:smooth;
        }

        body{
            background:#0f172a;
            color:white;
            font-family:'Poppins',sans-serif;
            min-height:100vh;
        }

        .navbar{
            background:#111827 !important;
        }

        .card,
        .feature-card,
        .stat-card,
        .course-card,
        .section-card,
        .roadmap-box{

            background:#1e293b;
            color:white;

            border:none;

            border-radius:20px;

            backdrop-filter:blur(10px);

            border:1px solid rgba(
                255,
                255,
                255,
                0.08
            );

        }

        .course-card:hover,
        .feature-card:hover,
        .stat-card:hover{

            transform:translateY(-8px);

            transition:0.3s;

        }

        a{
            text-decoration:none;
        }

        .btn-primary{

            background:#2563eb;
            border:none;

        }

        .btn-primary:hover{

            background:#1d4ed8;

        }

        .section-title{

            font-weight:700;

            text-align:center;

            margin-bottom:40px;

        }

        footer{

            background:#111827;

            padding:30px;

            text-align:center;

            margin-top:80px;

            color:#cbd5e1;

        }

        hr{

            border-color:#334155;

        }

        input,
        textarea,
        select{

            background:#1e293b !important;

            color:white !important;

            border:1px solid #334155 !important;

        }

        input::placeholder,
        textarea::placeholder{

            color:#94a3b8 !important;

        }

        table{

            color:white !important;

        }

        .text-muted{

            color:#94a3b8 !important;

        }

    </style>

</head>

<body>

{% block content %}
{% endblock %}

</body>

</html>
