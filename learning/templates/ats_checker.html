<!DOCTYPE html>

<html>

<head>

<title>ATS Resume Checker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{
    background:#f4f7fc;
}

.hero{
    background:linear-gradient(
        135deg,
        #198754,
        #20c997
    );
    color:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    margin-bottom:40px;
}

.card-custom{
    border:none;
    border-radius:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.score{
    font-size:70px;
    font-weight:bold;
    color:#198754;
}

.upload-box{
    border:2px dashed #20c997;
    border-radius:15px;
    padding:30px;
    background:#f8fffc;
}

</style>

</head>

<body>

<div class="container mt-4">

```
<div class="hero">

    <h1>
        📄 ATS Resume Checker
    </h1>

    <p>
        Upload Your Resume and Analyze ATS Performance
    </p>

</div>

<div class="card card-custom mb-4">

    <div class="card-body p-4">

        <h3 class="mb-4 text-center">
            Upload Resume
        </h3>

        <div class="upload-box">

            <form method="POST"
                  enctype="multipart/form-data">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    type="submit"
                    class="btn btn-success">

                    Upload Resume

                </button>

            </form>

        </div>

    </div>

</div>

{% if ats_score %}

<div class="card card-custom">

    <div class="card-body text-center p-5">

        <h2>
            ATS Score
        </h2>

        <div class="score">

            {{ ats_score }}%

        </div>

    </div>

</div>

<div class="card card-custom mt-4">

    <div class="card-body">

        <h3>
            Missing Skills
        </h3>

        <ul>

            {% for skill in missing_skills %}

            <li>
                {{ skill }}
            </li>

            {% endfor %}

        </ul>

    </div>

</div>

{% endif %}

<div class="text-center mt-4 mb-5">

    <a href="/learning/java-full-stack/"
       class="btn btn-primary btn-lg">

        ← Back To Course

    </a>

</div>
```

</div>

</body>

</html>
