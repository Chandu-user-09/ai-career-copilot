<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Result</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

    :root{
        --bg:#0b0c14;
        --card:#161826;
        --line:#262a3d;
        --ink:#eef0fb;
        --muted:#8a8da3;
        --indigo:#6c63ff;
        --indigo-soft:#2a2660;
        --green:#2bb673;
        --amber:#f5a524;
        --red:#ef4a48;
    }

    *{
        box-sizing:border-box;
    }

    body{
        margin:0;
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        background:
            radial-gradient(900px 500px at 85% -10%, rgba(108,99,255,0.16), transparent 60%),
            radial-gradient(700px 400px at 10% 110%, rgba(43,182,115,0.08), transparent 60%),
            var(--bg);
        font-family:'Inter', sans-serif;
        color:var(--ink);
        -webkit-font-smoothing:antialiased;
        padding:32px 18px;
    }

    .card{
        width:100%;
        max-width:480px;
        background:var(--card);
        border:1px solid var(--line);
        border-radius:24px;
        padding:44px 38px 38px;
        text-align:center;
        box-shadow:0 30px 60px -30px rgba(0,0,0,0.6);
    }

    .badge{
        display:inline-flex;
        align-items:center;
        gap:8px;
        font-family:'Sora', sans-serif;
        font-size:12px;
        font-weight:700;
        letter-spacing:.12em;
        text-transform:uppercase;
        color:#b3aeff;
        background:rgba(108,99,255,0.14);
        border:1px solid rgba(108,99,255,0.32);
        padding:6px 14px;
        border-radius:999px;
        margin-bottom:24px;
    }

    /* ---------- SCORE RING ---------- */

    .ring-wrap{
        position:relative;
        width:180px;
        height:180px;
        margin:0 auto 28px;
    }

    .ring-wrap svg{
        transform:rotate(-90deg);
        width:100%;
        height:100%;
    }

    .ring-track{
        fill:none;
        stroke:var(--line);
        stroke-width:12;
    }

    .ring-fill{
        fill:none;
        stroke:var(--indigo);
        stroke-width:12;
        stroke-linecap:round;
        transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);
    }

    .ring-center{
        position:absolute;
        inset:0;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
    }

    .ring-score{
        font-family:'Sora', sans-serif;
        font-size:38px;
        font-weight:800;
        line-height:1;
        color:var(--ink);
    }

    .ring-label{
        font-size:11.5px;
        color:var(--muted);
        text-transform:uppercase;
        letter-spacing:.08em;
        margin-top:4px;
    }

    /* ---------- RANK ---------- */

    .rank-line{
        font-family:'Sora', sans-serif;
        font-size:20px;
        font-weight:700;
        margin:0 0 28px;
    }

    .rank-line span{
        color:var(--muted);
        font-weight:500;
        font-size:14px;
        display:block;
        margin-bottom:4px;
        font-family:'Inter', sans-serif;
        text-transform:none;
        letter-spacing:0;
    }

    /* ---------- STATS ROW ---------- */

    .stats-row{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px;
        margin-bottom:32px;
    }

    .stat-box{
        border:1px solid var(--line);
        border-radius:14px;
        padding:16px 10px;
        background:#11131f;
    }

    .stat-box .num{
        font-family:'Sora', sans-serif;
        font-size:24px;
        font-weight:800;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:6px;
    }

    .stat-box.correct .num{ color:var(--green); }
    .stat-box.wrong .num{ color:var(--red); }

    .stat-box .lbl{
        font-size:12px;
        color:var(--muted);
        margin-top:4px;
        text-transform:uppercase;
        letter-spacing:.05em;
    }

    /* ---------- ACTIONS ---------- */

    .actions{
        display:flex;
        flex-direction:column;
        gap:12px;
    }

    .btn-primary-action{
        appearance:none;
        border:none;
        text-decoration:none;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:8px;
        width:100%;
        background:linear-gradient(135deg, var(--indigo), #4f46e5);
        color:#fff;
        font-family:'Sora', sans-serif;
        font-weight:700;
        font-size:15px;
        padding:15px;
        border-radius:14px;
        cursor:pointer;
        box-shadow:0 16px 32px -16px rgba(108,99,255,0.55);
        transition:transform .15s ease, box-shadow .15s ease;
    }

    .btn-primary-action:hover{
        transform:translateY(-1px);
        box-shadow:0 20px 36px -16px rgba(108,99,255,0.65);
    }

    .btn-secondary-action{
        text-decoration:none;
        display:block;
        text-align:center;
        color:var(--muted);
        font-size:13.5px;
        font-weight:600;
        padding:10px;
    }

    .btn-secondary-action:hover{
        color:var(--ink);
    }

    @media (max-width:480px){
        .card{ padding:34px 24px 30px; }
        .ring-wrap{ width:150px; height:150px; }
        .ring-score{ font-size:32px; }
    }

</style>
</head>

<body>

<div class="card">

    <span class="badge">✓ Quiz Complete</span>

    <div class="ring-wrap">
        <svg viewBox="0 0 160 160">
            <circle class="ring-track" cx="80" cy="80" r="68"></circle>
            <circle class="ring-fill" id="ringFill" cx="80" cy="80" r="68"
                stroke-dasharray="427.26"
                stroke-dashoffset="427.26"></circle>
        </svg>
        <div class="ring-center">
            <span class="ring-score">{{ score }}%</span>
            <span class="ring-label">Score</span>
        </div>
    </div>

    <p class="rank-line">
        <span>Your performance rank</span>
        {{ rank }}
    </p>

    <div class="stats-row">
        <div class="stat-box correct">
            <div class="num">✓ {{ correct }}</div>
            <div class="lbl">Correct</div>
        </div>
        <div class="stat-box wrong">
            <div class="num">✕ {{ wrong }}</div>
            <div class="lbl">Wrong</div>
        </div>
    </div>

    <div class="actions">
        <a href="/learning/{{ course_slug }}/quiz/" class="btn-primary-action">
            🔁 Take Quiz Again
        </a>
        <a href="/learning/{{ course_slug }}/" class="btn-secondary-action">
            ← Back to course
        </a>
    </div>

</div>

<script id="result-data" data-score="{{ score }}"></script>
<script>
    const quizScore = parseInt(document.getElementById('result-data').dataset.score, 10);
    const circumference = 2 * Math.PI * 68;
    const offset = circumference - (quizScore / 100) * circumference;
    const ringFill = document.getElementById('ringFill');

    ringFill.style.strokeDasharray = circumference;
    ringFill.style.strokeDashoffset = circumference;

    window.addEventListener('load', () => {
        setTimeout(() => {
            ringFill.style.strokeDashoffset = offset;
        }, 150);
    });

    if (quizScore >= 90) {
        document.documentElement.style.setProperty('--indigo', '#2bb673');
    } else if (quizScore < 50) {
        document.documentElement.style.setProperty('--indigo', '#ef4a48');
    }
</script>

</body>
</html>
