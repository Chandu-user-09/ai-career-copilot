<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ course_name }} - {{ level|title }} Questions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0b0f19;
            --card-bg: rgba(22, 28, 45, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-muted: #94a3b8;
            --accent-glow: #3b82f6;
            --answer-glow: #10b981;
        }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.08) 0px, transparent 50%);
        }

        .hero {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .hero h1 {
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 40%, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .level-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }

        .badge-easy { color: #10b981; border-color: rgba(16, 185, 129, 0.3); background: rgba(16, 185, 129, 0.05); }
        .badge-medium { color: #f59e0b; border-color: rgba(245, 158, 11, 0.3); background: rgba(245, 158, 11, 0.05); }
        .badge-hard { color: #ef4444; border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.05); }

        .question-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            margin-bottom: 25px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .question-card:hover {
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .q-number {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-glow);
        }

        .q-text {
            font-weight: 600;
            line-height: 1.5;
            margin-top: 5px;
            margin-bottom: 20px;
            color: #ffffff !important; /* Fixed contrast visibility issue */
        }

        .btn-toggle-ans {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: #e2e8f0;
            padding: 8px 18px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-toggle-ans:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .answer-box {
            background: rgba(16, 185, 129, 0.04);
            border-left: 4px solid var(--answer-glow);
            padding: 20px;
            border-radius: 0 14px 14px 0;
            margin-top: 15px;
            color: #e2e8f0;
            line-height: 1.6;
        }

        .btn-back {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 28px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="hero">
        <h1 class="display-6 mb-3">🎯 {{ course_name }} Interview Pool</h1>
        <span class="level-badge badge-{{ level|lower }}">{{ level }} Pool</span>
    </div>

    {% for q in questions %}
    <div class="card question-card">
        <div class="card-body p-4">
            
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="q-number">Question {{ forloop.counter }}</span>
            </div>

            <h5 class="q-text">{{ q.q }}</h5>

            <button class="btn btn-toggle-ans" type="button" data-bs-toggle="collapse" data-bs-target="#ans-{{ forloop.counter }}" aria-expanded="false">
                👁️ View Answer
            </button>

            <div class="collapse" id="ans-{{ forloop.counter }}">
                <div class="answer-box">
                    <strong class="text-success d-block mb-2">💡 Recommended Explanation:</strong>
                    {{ q.a }}
                </div>
            </div>

        </div>
    </div>
    {% empty %}
    <div class="text-center p-5 border border-dashed rounded-3" style="border-color: var(--border-color);">
        <p class="text-muted">No configuration pools found running for this target layer.</p>
    </div>
    {% endfor %}

    <div class="text-center mt-5 mb-5">
        <a href="/learning/{{ course_name|slugify }}/interview/" class="btn btn-back">
            ← Return to Level Configuration
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
